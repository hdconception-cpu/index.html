<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scénario 3 - Gestion des présences</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    h1 { color: #333; }
    .participant { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; }
    .checkbox { font-size: 20px; cursor: pointer; }
    .button { background: #007AFF; color: white; border: none; padding: 10px 20px; margin: 10px 0; cursor: pointer; }
    .button:hover { background: #0056b3; }
    .status { margin-top: 10px; padding: 10px; background: #f0f0f0; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Présences des participants</h1>

  <div id="participants-list"></div>

  <button class="button" id="sync-btn">✅ Synchroniser avec le backend</button>
  <button class="button" id="pdf-btn">📄 Générer le rapport PDF</button>

  <div class="status" id="status">Statut : chargement...</div>

  <script>
    const CHANTIER_ID = 123;
    const API_BASE_URL = 'http://localhost:3000/api'; // Remplace par ton backend réel

    let presences = {};

    // Charger les présences depuis localStorage
    const loadPresences = () => {
      const saved = localStorage.getItem(`presences_${CHANTIER_ID}`);
      if (saved) presences = JSON.parse(saved);
    };

    // Sauvegarder dans localStorage
    const savePresences = () => {
      localStorage.setItem(`presences_${CHANTIER_ID}`, JSON.stringify(presences));
    };

    // Toggle présence
    const togglePresence = (id) => {
      presences[id] = !presences[id];
      savePresences();
      renderParticipants();
    };

    // Rendu des participants
    const renderParticipants = () => {
      const list = document.getElementById('participants-list');
      list.innerHTML = '';

      const participants = [
        { id: 1, name: 'Jean Dupont' },
        { id: 2, name: 'Marie Martin' },
        { id: 3, name: 'Pierre Durand' }
      ];

      participants.forEach(p => {
        const div = document.createElement('div');
        div.className = 'participant';
        div.innerHTML = `
          <span>${p.name}</span>
          <span class="checkbox" onclick="togglePresence(${p.id})">
            ${presences[p.id] ? '✅' : '⬜'}
          </span>
        `;
        list.appendChild(div);
      });
    };

    // Synchroniser avec le backend
    const syncToBackend = async () => {
      const status = document.getElementById('status');
      status.textContent = 'Envoi en cours...';

      try {
        const response = await fetch(`${API_BASE_URL}/chantiers/presences`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chantierId: CHANTIER_ID,
            presences: Object.entries(presences).map(([id, present]) => ({
              participantId: parseInt(id),
              present,
            })),
          }),
        });

        if (!response.ok) throw new Error('Échec de la synchronisation');

        // Nettoyer localStorage
        localStorage.removeItem(`presences_${CHANTIER_ID}`);
        status.textContent = '✅ Présences synchronisées avec le backend.';
      } catch (error) {
        status.textContent = '❌ Erreur : ' + error.message;
      }
    };

    // Générer le PDF
    const generatePDF = async () => {
      const status = document.getElementById('status');
      status.textContent = 'Génération du PDF...';

      try {
        const response = await fetch(`${API_BASE_URL}/rapports/pdf`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chantierId: CHANTIER_ID }),
        });

        if (!response.ok) throw new Error('Échec de génération du PDF');

        const data = await response.json();
        status.innerHTML = `📄 <a href="${data.pdfUrl}" target="_blank">Télécharger le PDF</a>`;
      } catch (error) {
        status.textContent = '❌ Erreur : ' + error.message;
      }
    };

    // Initialisation
    loadPresences();
    renderParticipants();

    // Événements
    document.getElementById('sync-btn').addEventListener('click', syncToBackend);
    document.getElementById('pdf-btn').addEventListener('click', generatePDF);
  </script>
</body>
</html>
